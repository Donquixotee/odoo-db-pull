    <!-- ────────────────────────────────────────────────────────────────────────
         STEP 3: PULL PROGRESS
         ──────────────────────────────────────────────────────────────────────── -->
    <div x-show="currentStep === 3" class="w-full max-w-4xl flex flex-col gap-8 w-full" x-cloak
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0">

      <!-- ── Phase 1: Database Pull ──────────────────────────────────────────── -->
      <div class="space-y-4">
        <div class="flex justify-between items-end">
          <div class="space-y-1">
            <div class="flex items-center gap-3">
              <span class="material-symbols-outlined text-primary text-xl">database</span>
              <h1 class="font-headline text-2xl font-extrabold tracking-tight text-on-surface">Database Pull</h1>
              <!-- Status badge -->
              <span x-show="done" class="text-[10px] font-label font-bold px-2 py-0.5 rounded-full bg-green-500/20 text-green-400 border border-green-500/30">✓ DONE</span>
              <span x-show="pulling" class="text-[10px] font-label font-bold px-2 py-0.5 rounded-full bg-primary/20 text-primary border border-primary/30 animate-pulse">RUNNING</span>
            </div>
            <p class="text-on-surface-variant text-sm pl-9"
               x-text="form.sourceDb + ' ➜ ' + (form.targetDbName || form.sourceDb)"></p>
          </div>
          <div class="text-right">
            <span class="font-mono text-3xl font-bold text-primary" x-text="progress + '%'"></span>
          </div>
        </div>
        <!-- DB Progress Bar -->
        <div class="h-3 w-full bg-surface-container-lowest rounded-full overflow-hidden border border-outline-variant/10">
          <div class="h-full bg-gradient-to-r from-primary to-primary-dim rounded-r-full shadow-[0_0_15px_rgba(189,157,255,0.5)] transition-all duration-500"
               :style="'width: ' + progress + '%'"></div>
        </div>
      </div>

      <!-- Terminal Log Panel -->
      <div class="w-full flex-1 min-h-[300px] max-h-[420px] flex flex-col bg-surface-container-lowest rounded-xl overflow-hidden shadow-2xl border border-outline-variant/15 font-mono text-sm text-on-surface text-left">
        <!-- macOS Style Header -->
        <div class="flex items-center justify-between px-4 py-3 bg-surface-container-high border-b border-outline-variant/10">
          <div class="flex gap-2">
            <div class="w-3 h-3 rounded-full bg-[#FF5F56]"></div>
            <div class="w-3 h-3 rounded-full bg-[#FFBD2E]"></div>
            <div class="w-3 h-3 rounded-full bg-[#27C93F]"></div>
          </div>
          <div class="font-mono text-[11px] text-on-surface-variant tracking-wider flex items-center gap-2">
            <span class="material-symbols-outlined text-[14px]">terminal</span>
            db-pull-shell
          </div>
          <div class="w-12"></div>
        </div>
        <!-- Terminal Body -->
        <div class="p-5 flex-1 overflow-y-auto custom-scrollbar" id="log-box">
          <template x-for="(log, idx) in logs" :key="idx">
            <div class="flex gap-4 mb-1">
              <span class="text-outline-variant select-none" x-text="idx + 1"></span>
              <span :class="logClass(log.status)" x-text="log.message"></span>
            </div>
          </template>
          <span x-show="pulling" class="terminal-cursor"></span>
        </div>
      </div>

      <!-- ── Phase 2: Filestore Deploy (shown only when enabled) ───────────── -->
      <template x-if="filestore.enabled">
        <div class="space-y-4" :class="done ? '' : 'opacity-40 pointer-events-none'">

          <!-- Divider -->
          <div class="flex items-center gap-4">
            <div class="h-px flex-1 bg-outline-variant/20"></div>
            <span class="text-[10px] font-label font-bold text-outline uppercase tracking-widest">Phase 2</span>
            <div class="h-px flex-1 bg-outline-variant/20"></div>
          </div>

          <div class="flex justify-between items-end">
            <div class="space-y-1">
              <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-tertiary text-xl">folder_zip</span>
                <h2 class="font-headline text-2xl font-extrabold tracking-tight text-on-surface">Filestore Deploy</h2>
                <!-- Status badge -->
                <span x-show="filestoreDone" class="text-[10px] font-label font-bold px-2 py-0.5 rounded-full bg-green-500/20 text-green-400 border border-green-500/30">✓ DONE</span>
                <span x-show="!filestoreDone && done && filestore.logs.length > 0 && !filestoreDone"
                      class="text-[10px] font-label font-bold px-2 py-0.5 rounded-full bg-tertiary/20 text-tertiary border border-tertiary/30 animate-pulse">RUNNING</span>
                <span x-show="!done"
                      class="text-[10px] font-label font-bold px-2 py-0.5 rounded-full bg-surface-container-highest text-outline border border-outline-variant/20">WAITING FOR DB</span>
              </div>
              <p class="text-on-surface-variant text-sm pl-9"
                 x-text="'Deploying ' + (filestore.dbName || form.targetDbName || form.sourceDb) + ' filestore'"></p>
            </div>
            <div class="text-right">
              <span class="font-mono text-3xl font-bold text-tertiary" x-text="filestoreProgress + '%'"></span>
            </div>
          </div>

          <!-- Filestore Progress Bar -->
          <div class="h-3 w-full bg-surface-container-lowest rounded-full overflow-hidden border border-outline-variant/10">
            <div class="h-full bg-gradient-to-r from-tertiary to-tertiary/60 rounded-r-full shadow-[0_0_15px_rgba(189,157,255,0.3)] transition-all duration-500"
                 :style="'width: ' + filestoreProgress + '%'"></div>
          </div>

          <!-- Filestore Log Panel -->
          <div x-show="filestore.logs.length > 0" x-transition
               class="w-full flex flex-col bg-surface-container-lowest rounded-xl overflow-hidden shadow-xl border border-outline-variant/15 font-mono text-sm text-on-surface text-left">
            <div class="flex items-center justify-between px-4 py-3 bg-surface-container-high border-b border-outline-variant/10">
              <div class="flex gap-2">
                <div class="w-3 h-3 rounded-full bg-[#FF5F56]"></div>
                <div class="w-3 h-3 rounded-full bg-[#FFBD2E]"></div>
                <div class="w-3 h-3 rounded-full bg-[#27C93F]"></div>
              </div>
              <div class="font-mono text-[11px] text-on-surface-variant tracking-wider flex items-center gap-2">
                <span class="material-symbols-outlined text-[14px]">folder_zip</span>
                filestore-shell
              </div>
              <div class="w-12"></div>
            </div>
            <div class="p-5 max-h-[280px] overflow-y-auto custom-scrollbar" id="fs-log-box">
              <template x-for="(log, idx) in filestore.logs" :key="idx">
                <div class="flex gap-4 mb-1">
                  <span class="text-outline-variant select-none" x-text="idx + 1"></span>
                  <span :class="logClass(log.status)" x-text="log.message"></span>
                </div>
              </template>
            </div>
          </div>

          <!-- Waiting placeholder when no logs yet -->
          <div x-show="done && filestore.logs.length === 0 && !filestoreDone"
               class="flex items-center gap-3 p-4 rounded-xl bg-surface-container-low border border-outline-variant/10 text-sm text-on-surface-variant">
            <span class="material-symbols-outlined animate-spin text-tertiary text-sm">refresh</span>
            Connecting to source server and downloading filestore…
          </div>

        </div>
      </template>

      <!-- ── Completion / Reset Button ───────────────────────────────────────── -->
      <div class="flex justify-center pt-4"
           x-show="!pulling && progress > 0 && (!filestore.enabled || filestoreDone || filestore.logs.some(l => l.status === 'error'))">
        <button @click="reset()" class="flex items-center gap-2 px-6 py-3 rounded-lg bg-surface-container-high ring-1 ring-outline-variant/20 hover:bg-surface-bright transition-all text-on-surface font-label font-bold">
          <span class="material-symbols-outlined text-sm">refresh</span>
          START NEW PULL
        </button>
      </div>
    </div>
