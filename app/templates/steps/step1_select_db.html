    <!-- ────────────────────────────────────────────────────────────────────────
         STEP 1: SELECT DB
         ──────────────────────────────────────────────────────────────────────── -->
    <div x-show="currentStep === 1" class="w-full max-w-3xl" x-cloak
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0">
      
      <div class="mb-8 text-center space-y-2">
        <h2 class="text-4xl font-headline font-extrabold tracking-tight text-on-surface">Choose Database</h2>
        <p class="text-on-surface-variant max-w-lg mx-auto">Select the source Odoo instance and target database for pulling.</p>
      </div>

      <div class="space-y-8">
        <!-- Step A: Instances -->
        <section class="space-y-4">
          <label class="font-label text-xs uppercase tracking-widest text-primary font-bold">Step A: Detected Instances</label>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <template x-for="p in pairs" :key="p.odoo">
              <div @click="form.selectedPair = p.odoo; onPairChange()" 
                   class="relative group cursor-pointer p-5 rounded-xl transition-all duration-300 ring-1"
                   :class="form.selectedPair === p.odoo ? 'bg-surface-bright ring-primary/50 shadow-[0_0_15px_rgba(189,157,255,0.15)]' : 'bg-surface-container hover:bg-surface-bright ring-outline-variant/30'">
                <div class="flex justify-between items-start mb-3">
                  <span class="material-symbols-outlined transition-colors" data-icon="dns" :class="form.selectedPair === p.odoo ? 'text-primary' : 'text-on-surface-variant group-hover:text-primary'">dns</span>
                  <div x-show="form.selectedPair === p.odoo" class="bg-primary/20 text-primary text-[10px] px-2 py-0.5 rounded-full font-bold uppercase">Selected</div>
                </div>
                <h3 class="font-headline font-bold text-on-surface" x-text="p.odoo"></h3>
                <p class="text-xs text-on-surface-variant font-mono mt-1" x-text="'DB container: ' + p.db"></p>
                <div x-show="form.selectedPair === p.odoo" class="absolute inset-0 bg-primary/5 rounded-xl pointer-events-none"></div>
              </div>
            </template>
          </div>
        </section>

        <!-- Step B: Databases -->
        <section x-show="form.selectedPair" x-transition class="space-y-4 p-8 rounded-2xl bg-surface-container-low border border-outline-variant/10">
          <div class="flex items-center justify-between">
            <label class="font-label text-xs uppercase tracking-widest text-primary font-bold">Step B: Target Database</label>
            <div x-show="loadingDbs" class="text-xs text-primary animate-pulse font-mono flex items-center gap-2">
              <span class="material-symbols-outlined text-sm animate-spin">refresh</span> Loading...
            </div>
          </div>
          
          <div class="space-y-2 max-h-60 overflow-y-auto pr-2 custom-scrollbar" x-show="!loadingDbs && remoteDbs.length > 0">
            <template x-for="db in remoteDbs" :key="db">
              <div @click="form.sourceDb = db" 
                   class="flex items-center justify-between p-4 rounded-xl transition-colors group cursor-pointer"
                   :class="form.sourceDb === db ? 'bg-surface-container-lowest ring-1 ring-primary' : 'bg-surface-container-low/50 hover:bg-surface-bright'">
                <div class="flex items-center gap-4">
                  <div class="w-4 h-4 rounded-full border-2 flex items-center justify-center transition-colors"
                       :class="form.sourceDb === db ? 'border-primary' : 'border-outline-variant'">
                    <div x-show="form.sourceDb === db" class="w-2 h-2 rounded-full bg-primary"></div>
                  </div>
                  <p class="font-headline font-bold leading-none" :class="form.sourceDb === db ? 'text-on-surface' : 'text-on-surface/60 group-hover:text-on-surface'" x-text="db"></p>
                </div>
                <span x-show="form.sourceDb === db" class="material-symbols-outlined text-primary text-xl" data-icon="verified">verified</span>
              </div>
            </template>
          </div>
        </section>

        <!-- Remote User Override -->
        <section x-show="form.selectedPair" class="space-y-4 pt-4 border-t border-outline-variant/10">
          <div class="w-full md:w-1/2 space-y-2">
            <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant">Remote Database User <span class="opacity-50 lowercase tracking-normal">(postgres role)</span></label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-sm opacity-50" data-icon="person">person</span>
              <input x-model="form.remoteDbUser" class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest rounded-lg border-none focus:ring-1 focus:ring-primary transition-all font-mono text-sm" type="text" placeholder="odoo"/>
            </div>
          </div>
        </section>
      </div>

      <div class="flex items-center justify-between pt-8 mt-8 border-t border-outline-variant/10">
        <button @click="currentStep = 0" class="flex items-center gap-2 px-6 py-3 rounded-lg bg-surface-container-high ring-1 ring-outline-variant/20 hover:bg-surface-bright transition-all text-on-surface">
          <span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>
          <span class="font-label text-sm font-bold">Back</span>
        </button>
        <button @click="currentStep = 2" :disabled="!form.sourceDb" class="group flex items-center gap-3 px-8 py-3 rounded-lg btn-primary-gradient text-on-primary-fixed shadow-lg hover:brightness-110 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
          <span class="font-label text-sm font-bold">Configure Pull</span>
          <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
        </button>
      </div>
    </div>
