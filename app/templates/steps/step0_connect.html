    <!-- ────────────────────────────────────────────────────────────────────────
         STEP 0: CONNECT
         ──────────────────────────────────────────────────────────────────────── -->
    <div x-show="currentStep === 0" class="w-full max-w-2xl"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0">
      
      <div class="mb-8 text-center space-y-2">
        <h2 class="text-3xl font-extrabold text-on-surface tracking-tight font-headline">Connect to Server</h2>
        <p class="text-sm text-on-surface-variant mt-2">Initialize your Odoo environment connection</p>
      </div>

      <div class="bg-surface-container-low rounded-xl p-8 ghost-border space-y-8">
        
        <!-- Saved Servers Section -->
        <div class="space-y-4">
          <label class="block text-sm font-label text-on-surface-variant tracking-wide">Saved Servers (SSH Alias)</label>
          <div class="relative">
            <select x-model="form.alias" @change="onAliasChange" class="w-full bg-surface-container-lowest border-none rounded-lg py-4 px-4 text-on-surface appearance-none focus:ring-1 focus:ring-primary/40 font-body transition-all cursor-pointer">
              <option value="">— Enter host manually —</option>
              <template x-for="h in sshHosts" :key="h.alias">
                <option :value="h.alias" x-text="h.alias + '  (' + h.hostname + ')'"></option>
              </template>
            </select>
            <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-primary">
              <span class="material-symbols-outlined">expand_more</span>
            </div>
          </div>
        </div>

        <div x-show="!form.alias">
          <div class="flex items-center gap-4 py-2">
            <div class="h-[1px] flex-1 bg-outline-variant/30"></div>
            <span class="text-[10px] font-label font-bold text-outline uppercase tracking-[0.2em]">or manual configuration</span>
            <div class="h-[1px] flex-1 bg-outline-variant/30"></div>
          </div>

          <div class="grid grid-cols-1 gap-6 pt-4">
            <div class="space-y-2">
              <label class="block text-sm font-label text-on-surface-variant">Server Address</label>
              <div class="relative flex items-center">
                <span class="absolute left-4 material-symbols-outlined text-outline text-lg">dns</span>
                <input x-model="form.host" class="w-full bg-surface-container-lowest border-none rounded-lg py-4 pl-12 pr-4 text-on-surface font-mono placeholder:text-outline/50 focus:ring-1 focus:ring-primary/40 transition-all" placeholder="server.example.com" type="text"/>
              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="space-y-2">
                <label class="block text-sm font-label text-on-surface-variant">SSH Username</label>
                <div class="relative flex items-center">
                  <span class="absolute left-4 material-symbols-outlined text-outline text-lg">person</span>
                  <input x-model="form.user" class="w-full bg-surface-container-lowest border-none rounded-lg py-4 pl-12 pr-4 text-on-surface font-mono placeholder:text-outline/50 focus:ring-1 focus:ring-primary/40 transition-all" placeholder="root" type="text"/>
                </div>
              </div>
              <div class="space-y-2">
                <label class="block text-sm font-label text-on-surface-variant flex justify-between">
                  Password <span class="text-[10px] text-outline uppercase font-bold tracking-tighter">Optional</span>
                </label>
                <div class="relative flex items-center">
                  <span class="absolute left-4 material-symbols-outlined text-outline text-lg">key</span>
                  <input x-model="form.password" class="w-full bg-surface-container-lowest border-none rounded-lg py-4 pl-12 pr-4 text-on-surface font-mono placeholder:text-outline/50 focus:ring-1 focus:ring-primary/40 transition-all" placeholder="••••••••" type="password"/>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="pt-4">
          <button @click="discover" :disabled="loading" class="w-full py-5 btn-primary-gradient text-on-primary-fixed font-headline font-extrabold tracking-tight rounded-lg flex items-center justify-center gap-3 transition-transform active:scale-[0.98] hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed">
            <span x-text="loading ? 'Connecting...' : 'Detect Odoo Instances'"></span>
            <span x-show="!loading" class="material-symbols-outlined">bolt</span>
            <span x-show="loading" class="material-symbols-outlined animate-spin">refresh</span>
          </button>
        </div>
      </div>
    </div>
