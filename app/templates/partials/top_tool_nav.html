<nav class="flex items-center gap-1 overflow-x-auto no-scrollbar" aria-label="Tools">
  {% for tool in tools %}
  <a href="{{ tool.route }}"
     class="h-10 shrink-0 px-3 rounded-lg flex items-center gap-2 text-sm transition-all {{ 'bg-primary text-on-primary-fixed font-bold shadow-[0_0_15px_rgba(189,157,255,0.25)]' if tool.id == active_tool else 'text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high' }}">
    <span class="material-symbols-outlined text-[18px] {{ 'filled' if tool.id == active_tool else '' }}">{{ tool.icon }}</span>
    <span>{{ tool.name }}</span>
  </a>
  {% endfor %}
</nav>
